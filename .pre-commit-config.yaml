# Hooks call the uv-locked toolchain directly (language: system) so hook
# versions never drift from uv.lock. Install once with: uv run pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]

      - id: mypy
        name: mypy --strict
        entry: uv run mypy
        language: system
        pass_filenames: false
        always_run: true

      - id: import-linter
        name: import-linter (architecture boundaries)
        entry: uv run lint-imports
        language: system
        pass_filenames: false
        always_run: true

      - id: eslint-ui
        name: eslint (ui boundaries)
        entry: pnpm -C ui lint
        language: system
        pass_filenames: false
        files: ^ui/.*\.(ts|tsx)$
