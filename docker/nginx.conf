# docker/nginx.conf — serve the SPA and reverse-proxy the API.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow up to 200 MB per request — covers large model files,
    # training tables, and SHAP sample CSVs.
    client_max_body_size 200M;

    # SPA fallback: any unmatched route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API requests to the backend container
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }

    # Cache static assets aggressively (build hashes invalidate)
    location ~* \.(?:js|css|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache for HTML (always fresh)
    location ~* \.html$ {
        add_header Cache-Control "no-store";
    }
}
