# docker-compose.yml — Cerebro local development environment.
#
# One file, two services (backend + ui). Bring up: `make up`. Tear down:
# `make down`. The full target list lives in the Makefile (`make help`).
#
# Network shape:
#   - `ui`     binds to host port ${UI_PORT:-3000}  -> container :80  (nginx)
#   - `backend` binds to host port ${API_PORT:-8000} -> container :8000 (uvicorn)
#     Port 8000 is exposed on the host so developers can reach
#     /docs (Swagger UI) and /redoc directly from a browser.
#     The UI's nginx also proxies /api/ -> http://backend:8000/ inside
#     the bridge network (see docker/nginx.conf).
#   - Artifacts live in ./data/ on the host (bind-mounted at /data in the
#     backend container). Seed example artifacts with `make seed` before
#     the first `make up`.

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: cerebro/backend:dev
    container_name: cerebro-backend
    environment:
      CEREBRO_DATA_DIR: /data
      CEREBRO_LOG_LEVEL: ${CEREBRO_LOG_LEVEL:-INFO}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./data:/data
    ports:
      - "${API_PORT:-8000}:8000"
    expose:
      - "8000"
    networks:
      - cerebro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
      args:
        VITE_API_URL: /api
    image: cerebro/ui:dev
    container_name: cerebro-ui
    ports:
      - "${UI_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cerebro
    restart: unless-stopped

networks:
  cerebro:
    driver: bridge
